global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']  # Adjust this if Prometheus is on a different address

  - job_name: 'docker'
    static_configs:
      - targets: ['192.168.1.101:8080']  # Example target for Docker monitoring

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['192.168.1.101:9100']  # Node Exporter on the same server

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['192.168.1.101:8080']  # cAdvisor for Docker metrics

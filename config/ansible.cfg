[defaults]
inventory = /mnt/workspace/inventory
host_key_checking = False
remote_user = ubuntu
private_key_file = /mnt/workspace/id_rsa
verbosity = 3
retry_files_enabled = False
stdout_callback = yaml

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
timeout = 10
retries = 12
pipelining = True

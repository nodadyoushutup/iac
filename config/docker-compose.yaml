services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - ${DOCKER_SOCK}:/var/run/docker.sock
    ports:
      - ${DOZZLE_PORT}

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - ${UPTIME_KUMA_DATA}:/app/data
    ports:
     - ${UPTIME_KUMA_PORT}
  
  postgresql:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${POSTGRES_DATA}:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT}
      
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    volumes:
      - ${NPM_DATA}:/data
      - ${NPM_LETS_ENCRYPT}:/etc/letsencrypt
    ports:
      - ${NPM_PORT_HTTP}
      - ${NPM_PORT_HTTPS}
      - ${NPM_PORT_ADMIN}

  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    ports:
      - ${NODE_EXPORTER_PORT}
    volumes:
      - /:/host:ro,rslave
  
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - ${CADVISOR_PORT}

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    user: "root"
    volumes:
      - ${PROMTEHEUS_DATA}:/prometheus
      - ${PROMETHEUS_CONFIG}:/etc/prometheus/prometheus.yml
    ports:
      - ${PROMTEHEUS_PORT}

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    user: "root"
    environment:  
      GF_SECURITY_ADMIN_USER: ${GRAFANA_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_SECURITY_ADMIN_PASSWORD}
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: ${GRAFANA_SECURITY_DISABLE_INITIAL_ADMIN_CREATION}
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_AUTH_ANONYMOUS_ENABLED}
      GF_AUTH_ANONYMOUS_ORG_ROLE: ${GRAFANA_AUTH_ANONYMOUS_ORG_ROLE}
      GF_AUTH_DISABLE_SIGNOUT_MENU: ${GRAFANA_AUTH_DISABLE_SIGNOUT_MENU}
      GF_AUTH_DISABLE_LOGIN_FORM: ${GRAFANA_AUTH_DISABLE_LOGIN_FORM}
    ports:
     - ${GRAFANA_PORT}
    volumes:
      - ${GRAFANA_DATA}:/var/lib/grafana

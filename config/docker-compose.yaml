services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - ${DOCKER_SOCK}:/var/run/docker.sock
    ports:
      - ${DOZZLE_PORT}

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - ${UPTIME_KUMA_DATA}:/app/data
    ports:
     - ${UPTIME_KUMA_PORT}
  
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${POSTGRES_DATA}:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT}
      
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    environment:
      DB_MYSQL_HOST: ${NGINX_PROXY_MANAGER_DB_HOST}
      DB_MYSQL_PORT: ${NGINX_PROXY_MANAGER_DB_PORT}
      DB_MYSQL_NAME: ${NGINX_PROXY_MANAGER_DB_NAME}
      DB_MYSQL_USER: ${NGINX_PROXY_MANAGER_DB_USER}
      DB_MYSQL_PASSWORD: ${NGINX_PROXY_MANAGER_DB_PASSWORD}
    volumes:
      - ${NGINX_PROXY_MANAGER_DATA}:/data
      - ${NGINX_PROXY_MANAGER_LETS_ENCRYPT}:/etc/letsencrypt
      - ./.env:/.env
      - ./npm_auth_fix.sh:/etc/services.d/custom-init/run:x
    ports:
      - ${NGINX_PROXY_MANAGER_PORTS_HTTP}
      - ${NGINX_PROXY_MANAGER_PORTS_HTTPS}
      - ${NGINX_PROXY_MANAGER_PORTS_ADMIN}
    depends_on: 
      - mysql
  
  mysql:
    image: jc21/mariadb-aria:10.11.5
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MARIADB_AUTO_UPGRADE: 1
      MYSQL_DATABASE: npm
      MYSQL_USER: npm
      MYSQL_PASSWORD: npm
    volumes:
      - ./mysql:/var/lib/mysql
    ports:
      - 3306:3306
  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    user: "root"
    environment:  
      GF_SECURITY_ADMIN_USER: ${GRAFANA_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_SECURITY_ADMIN_PASSWORD}
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: ${GRAFANA_SECURITY_DISABLE_INITIAL_ADMIN_CREATION}
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_AUTH_ANONYMOUS_ENABLED}
      GF_AUTH_ANONYMOUS_ORG_ROLE: ${GRAFANA_AUTH_ANONYMOUS_ORG_ROLE}
      GF_AUTH_DISABLE_SIGNOUT_MENU: ${GRAFANA_AUTH_DISABLE_SIGNOUT_MENU}
      GF_AUTH_DISABLE_LOGIN_FORM: ${GRAFANA_AUTH_DISABLE_LOGIN_FORM}
    ports:
     - ${GRAFANA_PORT}
    volumes:
      - ${GRAFANA_DATA}:/var/lib/grafana
    depends_on: 
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    user: "root"
    volumes:
      - ${PROMTEHEUS_DATA}:/prometheus
      - ${PROMETHEUS_CONFIG}:/etc/prometheus/prometheus.yml
    ports:
      - ${PROMTEHEUS_PORT}

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - ${CADVISOR_PORT}
    depends_on: 
      - prometheus

  exportarr-sonarr:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-sonarr
    restart: unless-stopped
    environment:
      API_KEY: ${SONARR_EXPORTARR_API_KEY}
      PORT: ${SONARR_EXPORTARR_PORT}
      URL: ${SONARR_EXPORTARR_URL}
      ENABLE_ADDITIONAL_METRICS: ${SONARR_ENABLE_ADDITIONAL_METRICS}
      ENABLE_UNKNOWN_QUEUE_ITEMS: ${SONARR_ENABLE_UNKNOWN_QUEUE_ITEMS}
    ports:
      - ${SONARR_EXPORTARR_PORT}:${SONARR_EXPORTARR_PORT}
    command: ["sonarr"]
    depends_on: 
      - prometheus

  exportarr-radarr:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-radarr
    restart: unless-stopped
    environment:
      API_KEY: ${RADARR_EXPORTARR_API_KEY}
      PORT: ${RADARR_EXPORTARR_PORT}
      URL: ${RADARR_EXPORTARR_URL}
      ENABLE_ADDITIONAL_METRICS: ${RADARR_ENABLE_ADDITIONAL_METRICS}
      ENABLE_UNKNOWN_QUEUE_ITEMS: ${RADARR_ENABLE_UNKNOWN_QUEUE_ITEMS}
    ports:
      - ${RADARR_EXPORTARR_PORT}:${RADARR_EXPORTARR_PORT}
    command: ["radarr"]
    depends_on: 
      - prometheus

  exportarr-lidarr:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-lidarr
    restart: unless-stopped
    environment:
      API_KEY: ${LIDARR_EXPORTARR_API_KEY}
      PORT: ${LIDARR_EXPORTARR_PORT}
      URL: ${LIDARR_EXPORTARR_URL}
      ENABLE_ADDITIONAL_METRICS: ${LIDARR_ENABLE_ADDITIONAL_METRICS}
      ENABLE_UNKNOWN_QUEUE_ITEMS: ${LIDARR_ENABLE_UNKNOWN_QUEUE_ITEMS}
    ports:
      - ${LIDARR_EXPORTARR_PORT}:${LIDARR_EXPORTARR_PORT}
    command: ["lidarr"]
    depends_on: 
      - prometheus

  exportarr-prowlarr:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-prowlarr
    restart: unless-stopped
    environment:
      API_KEY: ${PROWLARR_EXPORTARR_API_KEY}
      PORT: ${PROWLARR_EXPORTARR_PORT}
      URL: ${PROWLARR_EXPORTARR_URL}
      ENABLE_ADDITIONAL_METRICS: ${PROWLARR_ENABLE_ADDITIONAL_METRICS}
      ENABLE_UNKNOWN_QUEUE_ITEMS: ${PROWLARR_ENABLE_UNKNOWN_QUEUE_ITEMS}
      PROWLARR__BACKFILL: ${PROWLARR__BACKFILL}
      PROWLARR__BACKFILL_DATE_SINCE: ${PROWLARR__BACKFILL_DATE_SINCE}
    ports:
      - ${PROWLARR_EXPORTARR_PORT}:${PROWLARR_EXPORTARR_PORT}
    command: ["prowlarr"]
    depends_on: 
      - prometheus

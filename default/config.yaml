---
spacelift:
  path:
    private_key: /mnt/workspace/id_rsa
    ansible:
      config: /mnt/workspace/source/config/ansible.cfg
  dependency_deploy:
    docker:
      infra: true
      init: true
    collector:
      init: true
    grafana:
      init: true
      config: true
  provider:
    proxmox:
      endpoint: https://<public_ip>:1086
      insecure: true
      username: root@pve
      password: 
      ssh:
        node:
          address: <public_ip>
          name: pve
          port: 1022
    grafana:
      url: http://<public_ip>:3000
      auth: grafana:grafana
    prometheus:
      hostname: http://192.168.1.101:9090
      auth:
        username: prometheus
        password: prometheus
    fortigate:
      hostname: <public_ip>:7014
      insecure: true
      username: admin
      password: 
    postgres:
      host: <public_ip>:5432
      port: 5432
      database: postgres
      username: postgres
      password: 
      sslmode: disable
      connect_timeout: 15
      clientcert:
        cert: null
        key: null
gitconfig:
  user: nodadyoushutup
  email: admin@nodadyoushutup.com
prometheus:
  targets:
    - job_name: prometheus
      hostname: 192.168.1.101:9090
    - job_name: node_exporter_docker
      hostname: 192.168.1.101:9100
    - job_name: cadvisor
      hostname: 192.168.1.101:8080
docker:
  postgres:
    user: postgres
    password: 
    db: postgres
    port: 5432:5432
    data: ./postgres
  dozzle:
    port: 8085:8080
  uptime_kuma:
    port: 3001:3001
    data: ./uptime-kuma
  nginx_proxy_manager:
    port:
      http: 80:80
      https: 443:443
      admin: 81:81
    data: ./nginx-proxy-manager
    lets_encrypt: ./letsencrypt
  node_exporter:
    port: 9100:9100
  cadvisor:
    port: 8080:8080
  prometheus:
    config: ./prometheus.yml
    port: 9090:9090
    data: ./prometheus_data
  grafana:
    port: 3000:3000
    data: ./grafana
    security_admin:
      user: grafana
      password: grafana
      disable_init_admin: false
    auth:
      anonymous:
        enabled: false
        org_role: Admin
      disable:
        signout_menu: false
        login_form: false
  docker_sock: /var/run/docker.sock
  exportarr:
    sonarr:
      api_key: 950bfb57c2cc49c5b2e1e74fab3c5400
      port: 9707
      url: http://192.168.1.100:9989
      additional_metrics: true
      unknown_queue_items: true
    radarr:
      api_key: aec86fd08b3c49c9b8cef09de11b7102
      port: 9708
      url: http://192.168.1.100:9878
      additional_metrics: true
      unknown_queue_items: true
    lidarr:
      api_key: a2dbaf3b2b4047fda44ce12eb0363510
      port: 9709
      url: http://192.168.1.100:9686
      additional_metrics: true
      unknown_queue_items: true
    prowlarr:
      api_key: 8551a0ad414343c09083acd88f1feb9c
      port: 9710
      url: http://192.168.1.100:9696
      additional_metrics: true
      unknown_queue_items: true
      backfill: 
        enabled: true
        date_since: 2024-10-01
virtual_machine:
  username: ubuntu
  password: ubuntu
  keys:
    - ssh-rsa  jacob@Desktop
    - ssh-rsa  root@pve
  datastore_id:
    iso: local
    cloud_config: local
    disk: local-lvm
  file_id: jammy-server-cloudimg-amd64.img
  docker:
    vm_id: 101
    tags: ["terraform", "ubuntu", "docker"]
    startup:
      order: 1
      up_delay: 0
      down_delay: 0
    cpu:
      cores: 4
      type: "x86-64-v2-AES"
    disk:
      datastore_id: 
      file_id: 
      interface: "scsi0"
      size: 100
    address: 192.168.1.101/24
    gateway: "192.168.1.1"
    memory: 4096
    bridge: "vmbr0"
    ansible:
      host: <public_ip>
      port: 10122
    
  
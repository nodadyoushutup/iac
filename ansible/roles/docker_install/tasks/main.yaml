---
- name: Uninstall unwanted packages 
  apt: 
    name: 
      - docker.io 
      - docker-compose 
      - docker-compose-v2 
      - docker-doc 
      - podman-docker 
    state: absent 
    lock_timeout: 120

- name: Create the /etc/apt/keyrings directory with 0755 permissions
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key using curl
  ansible.builtin.command:
    cmd: "curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc"

- name: Set read permission for all users on the Docker GPG key
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Set up Docker APT repository
  ansible.builtin.shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo \"$VERSION_CODENAME\") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    executable: /bin/bash

- name: Update packages
  apt: 
    update_cache: yes

- name: Install Docker
  apt: 
    name: 
      - docker-ce
      - docker-ce-cli 
      - containerd.io 
      - docker-buildx-plugin 
      - docker-compose-plugin 
    state: present 
    update_cache: yes
    lock_timeout: 120

- name: Ensure group "docker" exists with correct gid
  ansible.builtin.group:
    name: docker
    state: present
    
- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

- name: Restart session to apply group changes
  shell: newgrp docker

- name: Copy docker-compose.yaml to the ansible user's home
  ansible.builtin.copy:
    src: "{{ lookup('env', 'COMPOSE_FILE') }}"
    dest: /home/{{ ansible_user }}/docker-compose.yaml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: Copy docker.env to the ansible user's home
  ansible.builtin.copy:
    src: /mnt/workspace/.env
    dest: /home/{{ ansible_user }}/.env
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes


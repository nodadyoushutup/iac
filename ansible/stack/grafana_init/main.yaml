---
# grafana_init
- name: Add Docker Hosts
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Load Configuration
      include_role:
        name: ../../role/config/load

    - name: Add Host from Config
      include_role:
        name: ../../role/config/add_host
      vars:
        key: docker

- name: Initialize Grafana
  hosts: docker
  gather_facts: no
  become: true
  check_mode: no
  tasks:
    - name: Load Configuration
      include_role:
        name: ../../role/config/load

    - name: Ping VM
      include_role:
        name: ../../role/virtual_machine/ping

    - name: Initialize Grafana
      block:
        - name: Restart Docker Compose Managed Services
          include_role:
            name: ../../role/docker/compose
          vars:
            run_down: true
            run_up: true
            up_services: "grafana prometheus"
            down_services: "grafana prometheus"
      when: virtual_machine_ping == true

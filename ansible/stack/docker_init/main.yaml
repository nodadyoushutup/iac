---
# docker init
- name: Init Docker
  hosts: docker
  gather_facts: no
  become: true
  check_mode: no
  tasks:
    - name: APT lock check
      include_role:
        name: ../../role/vm_ping

    - name: Install/Update Docker
      block:
        - name: Run VM initialization role
          include_role:
            name: ../../role/vm_init
        - name: Run Docker installation role
          include_role:
            name: ../../role/docker_install
        - name: Stop Docker Compose services
          include_role:
            name: ../../role/docker_compose_down
        - name: Start Docker Compose services
          include_role:
            name: ../../role/docker_compose_up
      when: ssh_check_success == true

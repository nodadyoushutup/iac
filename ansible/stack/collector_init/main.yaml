---
# collector_init.
- name: Add Docker Hosts
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Load Configuration
      include_role:
        name: ../../role/config_load

    - name: Add Host from Config
      include_role:
        name: ../../role/host_add
      vars:
        key: docker

- name: Initialize Collectors
  hosts: docker
  gather_facts: no
  become: true
  check_mode: no
  tasks:
    - name: Load Configuration
      include_role:
        name: ../../role/config_load

    - name: Ping VM
      include_role:
        name: ../../role/virtual_machine/ping

    - name: Initialize Collectors
      block:
        - name: Migrate Prometheus configuration
          include_role:
            name: ../../role/prometheus
        
        - name: Restart Docker Compose Managed Services
          include_role:
            name: ../../role/docker/compose
          vars:
            run_down: true
            run_up: true
            up_services: "prometheus cadvisor exportarr-radarr exportarr-sonarr exportarr-lidarr exportarr-prowlarr"
            down_services: "prometheus cadvisor exportarr-radarr exportarr-sonarr exportarr-lidarr exportarr-prowlarr"
      when: virtual_machine_ping == true

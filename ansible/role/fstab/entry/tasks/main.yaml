- name: Debug variable
  ansible.builtin.debug:
    var: fstab_entry
    
- name: Check if destination directory exists and has correct permissions
  stat: 
    path: "{{ fstab_entry.dest }}" 
  register: dir_stat 
  become: true 

- name: Unmount existing mount point if it exists or permissions are incorrect
  command: "umount -l {{ fstab_entry.dest }}" 
  when: not dir_stat.stat.exists or not dir_stat.stat.mode == '0755' 
  ignore_errors: true 
  become: true 

- name: Create destination directory with correct permissions
  file: 
    path: "{{ fstab_entry.dest }}" 
    state: directory 
    owner: "{{ ansible_user }}" 
    group: "{{ ansible_user }}" 
    mode: '0755' 
  when: not dir_stat.stat.exists or not dir_stat.stat.mode == '0755' 
  become: true 

- name: Mount all filesystems in /etc/fstab 
  command: mount -a 
  become: true 

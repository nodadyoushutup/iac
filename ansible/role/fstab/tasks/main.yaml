---
- name: Copy fstab to the remote machine
  template:
    src: fstab.j2
    dest: /etc/fstab
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Check if destination directories exist
  stat:
    path: "{{ item.dest }}"
  register: stat_result
  loop: "{{ config.virtual_machine.fstab }}"
  become: true

- name: Debug variable value
  ansible.builtin.debug:
    var: stat_result


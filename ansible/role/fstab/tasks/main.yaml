# role/fstab
---
- name: Copy fstab to the remote machine
  template:
    src: fstab.j2
    dest: /etc/fstab
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Unmount existing mount points
  command: "umount {{ item.dest }}"
  ignore_errors: true
  loop: "{{ config.virtual_machine.fstab }}"
  become: true
  when: >
    (dest_stat[item.dest].stat.exists is not defined or not dest_stat[item.dest].stat.exists) or
    (dest_stat[item.dest].stat.mode != "0755" or dest_stat[item.dest].stat.uid != ansible_user_id or
      dest_stat[item.dest].stat.gid != ansible_user_gid)

- name: Create destination directories
  file:
    path: "{{ item.dest }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  loop: "{{ config.virtual_machine.fstab }}"
  become: true
  when: >
    (dest_stat[item.dest].stat.exists is not defined or not dest_stat[item.dest].stat.exists) or
    (dest_stat[item.dest].stat.mode != "0755" or dest_stat[item.dest].stat.uid != ansible_user_id or
      dest_stat[item.dest].stat.gid != ansible_user_gid)

- name: Mount all filesystems in /etc/fstab
  command: mount -a
  become: true
---
- name: Verify MySQL connectivity
  command: "mysqladmin ping -h 192.168.1.101 -u npm -pnpm"
  register: mysql_connectivity
  retries: 5
  delay: 10
  until: mysql_connectivity.rc == 0
  failed_when: mysql_connectivity.rc != 0

- name: Ensure MySQL is connectable
  debug:
    msg: "MySQL is connectable."
  when: mysql_connectivity.rc == 0

- name: Check if 'user' table exists
  command: "mysql -h 192.168.1.101 -u npm -pnpm -D npm -e \"SHOW TABLES LIKE 'user';\""
  register: user_table_check
  retries: 5
  delay: 10
  until: user_table_check.stdout.find("user") != -1

- name: Ensure 'user' table exists
  assert:
    that:
      - user_table_check.stdout.find("user") != -1
    fail_msg: "The 'user' table does not exist in the MySQL database."

- name: Check if 'auth' table exists
  command: "mysql -h 192.168.1.101 -u npm -pnpm -D npm -e \"SHOW TABLES LIKE 'auth';\""
  register: auth_table_check
  retries: 5
  delay: 10
  until: auth_table_check.stdout.find("auth") != -1

- name: Ensure 'auth' table exists
  assert:
    that:
      - auth_table_check.stdout.find("auth") != -1
    fail_msg: "The 'auth' table does not exist in the MySQL database."

- name: Check if record with id=1 exists in 'user' table
  command: "mysql -h 192.168.1.101 -u npm -pnpm -D npm -e \"SELECT COUNT(*) FROM user WHERE id = 1;\""
  register: user_id_check
  retries: 5
  delay: 10
  until: user_id_check.stdout.find("1") != -1

- name: Ensure record with id=1 exists in 'user' table
  assert:
    that:
      - user_id_check.stdout.find("1") != -1
    fail_msg: "Record with id=1 does not exist in the 'user' table."

- name: Check if record with id=1 exists in 'auth' table
  command: "mysql -h 192.168.1.101 -u npm -pnpm -D npm -e \"SELECT COUNT(*) FROM auth WHERE id = 1;\""
  register: auth_id_check
  retries: 5
  delay: 10
  until: auth_id_check.stdout.find("1") != -1

- name: Ensure record with id=1 exists in 'auth' table
  assert:
    that:
      - auth_id_check.stdout.find("1") != -1
    fail_msg: "Record with id=1 does not exist in the 'auth' table."

- name: Update email for record with id=1 in 'user' table
  command: "mysql -h 192.168.1.101 -u npm -pnpm -D npm -e \"UPDATE user SET email='admin@nodadyoushutup.com' WHERE id='1';\""
  register: update_user_email
  changed_when: update_user_email.rc == 0
---
- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Run docker compose down
  ansible.builtin.shell: |
    export COMPOSE_FILE=/home/{{ ansible_user }}/docker-compose.yaml
    docker compose down {{ down_services | default('') }}
  args:
    executable: /bin/bash
  environment:
    COMPOSE_FILE: "/home/{{ ansible_user }}/docker-compose.yaml"
  when: run_down

- name: Run docker compose up
  ansible.builtin.shell: |
    export COMPOSE_FILE=/home/{{ ansible_user }}/docker-compose.yaml
    docker compose up -d {{ up_services | default('') }}
  args:
    executable: /bin/bash
  environment:
    COMPOSE_FILE: "/home/{{ ansible_user }}/docker-compose.yaml"
  when: run_up

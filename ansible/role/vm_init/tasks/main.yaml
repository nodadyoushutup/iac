---
- name: Load configuration
  include_vars:
    file: "{{ lookup('env', 'TF_VAR_CONFIG') }}"
    name: config

- name: Copy .gitconfig to the ansible user's home
  copy:
    src: "{{ config.path.gitconfig }}"
    dest: /home/{{ ansible_user }}/.gitconfig.yaml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: APT lock check
  include_role:
    name: ../../role/apt_lock_check

- block:
    - name: Add user to sudo group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: "sudo"
        append: yes

    - name: Install necessary packages
      apt:
        name:
          - nfs-common
          - zip
          - net-tools
          - ca-certificates
          - curl
          - postgresql-client
          - git
          - python3
          - python3-pip
          - whois
        state: present
        update_cache: yes
  when: apt_lock_check_success
  name: "Add user and install packages only after apt lock is cleared"

---
- name: Get token
  uri:
    url: "{{ config.docker.nginx_proxy_manager.host }}/api/tokens"
    method: POST
    headers:
      Content-Type: "application/json"
    body_format: json
    body:
      identity: "admin@nodadyoushutup.com"
      secret: "password"
    return_content: yes
  register: token_response

- name: Extract token
  set_fact:
    token: "{{ token_response.json.token }}"
  when: token_response.json.token is defined

- name: Fail if token retrieval failed
  fail:
    msg: "Failed to retrieve token."
  when: token is not defined

- name: Debug host_config value
  debug:
    var: host_config

- name: Query existing certificates
  uri:
    url: "{{ config.docker.nginx_proxy_manager.host }}/api/nginx/certificates"
    method: GET
    headers:
      Authorization: "Bearer {{ token }}"
    return_content: yes
  register: certificates_response

- name: Debug host_config value
  debug:
    var: certificates_response

- name: Find existing certificate ID
  set_fact:
    certificate_id: "{{ item.id if item.domain_names | sort == host_config.domain_names | sort else none }}"
  loop: "{{ certificates_response.json }}"
  loop_control:
    loop_var: item

- name: Create new SSL certificate if none exists
  uri:
    url: "{{ config.docker.nginx_proxy_manager.host }}/api/nginx/certificates"
    method: POST
    headers:
      Authorization: "Bearer {{ token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      provider: "letsencrypt"
      nice_name: "{{ host_config.domain_names[0] }} Certificate"
      domain_names: "{{ host_config.domain_names }}"
      meta:
        letsencrypt_agree: true
        letsencrypt_email: "admin@nodadyoushutup.com"
    return_content: yes
    status_code: [200, 201]
  register: create_cert_response
  when: certificate_id is none

- name: Set certificate ID from newly created certificate
  set_fact:
    certificate_id: "{{ create_cert_response.json.id }}"
  when: certificate_id is none


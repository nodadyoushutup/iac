---
- name: Get token
  uri:
    url: "{{ config.docker.nginx_proxy_manager.database.host }}:{{ config.docker.nginx_proxy_manager.port.admin }}/api/tokens"
    method: POST
    headers:
      Content-Type: "application/json"
    body_format: json
    body:
      identity: "admin@nodadyoushutup.com"
      secret: "password"
    return_content: yes
  register: token_response

- name: Extract token
  set_fact:
    token: "{{ token_response.json.token }}"
  when: token_response.json.token is defined

- name: Fail if token retrieval failed
  fail:
    msg: "Failed to retrieve token."
  when: token is not defined

- name: Query existing certificates
  uri:
    url: "{{ config.docker.nginx_proxy_manager.database.host }}:{{ config.docker.nginx_proxy_manager.port.admin }}/api/nginx/certificates"
    method: GET
    headers:
      Authorization: "Bearer {{ token }}"
    return_content: yes
  register: certificates_response

- name: Initialize certificate ID as false
  set_fact:
    certificate_id: false

- name: Find existing certificate ID
  set_fact:
    certificate_id: "{{ (certificates_response.json | selectattr('domain_names', '==', host_config.domain_names) | list | first).id | default(false) }}"
  when: certificates_response.json | selectattr('domain_names', '==', host_config.domain_names) | list | length > 0

- name: Create new SSL certificate if none exists
  uri:
    url: "{{ config.docker.nginx_proxy_manager.database.host }}:{{ config.docker.nginx_proxy_manager.port.admin }}/api/nginx/certificates"
    method: POST
    headers:
      Authorization: "Bearer {{ token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      provider: "letsencrypt"
      nice_name: "{{ host_config.domain_names[0] }} Certificate"
      domain_names: "{{ host_config.domain_names }}"
      meta:
        letsencrypt_agree: true
        letsencrypt_email: "admin@nodadyoushutup.com"
    return_content: yes
    status_code: [200, 201]
  register: create_cert_response
  when: certificate_id is false

- name: Set certificate ID from newly created certificate
  set_fact:
    certificate_id: "{{ create_cert_response.json.id }}"
  when: certificate_id is false

- name: Check if proxy host exists for domain
  uri:
    url: "{{ config.docker.nginx_proxy_manager.database.host }}:{{ config.docker.nginx_proxy_manager.port.admin }}/api/nginx/proxy-hosts"
    method: GET
    headers:
      Authorization: "Bearer {{ token }}"
    return_content: yes
  register: hosts_response

- name: Initialize certificate ID as false
  set_fact:
    host_id: false

- name: Find existing host ID
  set_fact:
    host_id: "{{ (hosts_response.json | selectattr('domain_names', '==', host_config.domain_names) | list | first).id | default(false) }}"
  when: hosts_response.json | selectattr('domain_names', '==', host_config.domain_names) | list | length > 0

- name: Create proxy host if none exists
  uri:
    url: "{{ config.docker.nginx_proxy_manager.database.host }}:{{ config.docker.nginx_proxy_manager.port.admin }}/api/nginx/proxy-hosts"
    method: POST
    headers:
      Authorization: "Bearer {{ token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      domain_names: "{{ host_config.domain_names }}"
      forward_scheme: "{{ host_config.forward_scheme }}"
      forward_host: "{{ host_config.forward_host }}"
      forward_port: "{{ host_config.forward_port }}"
      certificate_id: "{{ certificate_id }}"
      ssl_forced: "{{ host_config.ssl_forced }}"
      hsts_enabled: "{{ host_config.hsts_enabled }}"
      hsts_subdomains: "{{ host_config.hsts_subdomains }}"
      http2_support: "{{ host_config.http2_support }}"
      block_exploits: "{{ host_config.block_exploits }}"
      caching_enabled: "{{ host_config.caching_enabled }}"
      allow_websocket_upgrade: "{{ host_config.allow_websocket_upgrade }}"
      access_list_id: "{{ host_config.access_list_id }}"
      enabled: "{{ host_config.enabled }}"
    return_content: yes
    status_code: [200, 201]
  register: create_host_response
  when: host_id is false

- name: Update proxy host if it exists
  uri:
    url: "{{ config.docker.nginx_proxy_manager.database.host }}:{{ config.docker.nginx_proxy_manager.port.admin }}/api/nginx/proxy-hosts/{{ host_id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      domain_names: "{{ host_config.domain_names }}"
      forward_scheme: "{{ host_config.forward_scheme }}"
      forward_host: "{{ host_config.forward_host }}"
      forward_port: "{{ host_config.forward_port }}"
      certificate_id: "{{ certificate_id }}"
      ssl_forced: "{{ host_config.ssl_forced }}"
      hsts_enabled: "{{ host_config.hsts_enabled }}"
      hsts_subdomains: "{{ host_config.hsts_subdomains }}"
      http2_support: "{{ host_config.http2_support }}"
      block_exploits: "{{ host_config.block_exploits }}"
      caching_enabled: "{{ host_config.caching_enabled }}"
      allow_websocket_upgrade: "{{ host_config.allow_websocket_upgrade }}"
      access_list_id: "{{ host_config.access_list_id }}"
      enabled: "{{ host_config.enabled }}"
    return_content: yes
    status_code: [200, 201]
  register: update_host_response
  when: host_id is not false
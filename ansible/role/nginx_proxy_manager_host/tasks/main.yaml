---
- name: Get token
  uri:
    url: "http://192.168.1.101:81/api/tokens"
    method: POST
    headers:
      Content-Type: "application/json"
    body_format: json
    body:
      identity: "admin@nodadyoushutup.com"
      secret: "password"
    return_content: yes
  register: token_response

- name: Extract token
  set_fact:
    token: "{{ token_response.json.token }}"
  when: token_response.json.token is defined

- name: Fail if token retrieval failed
  fail:
    msg: "Failed to retrieve token."
  when: token is not defined

- name: Check if SSL certificate exists for domain
  uri:
    url: "http://192.168.1.101:81/api/nginx/certificates"
    method: GET
    headers:
      Authorization: "Bearer {{ token }}"
    return_content: yes
  register: certificates_response

- name: Find existing certificate ID
  set_fact:
    certificate_id: "{{ item.id }}"
  loop: "{{ certificates_response.json }}"
  when: item.domain_names == domain_names
  vars:
    domain_names: ["truenas.nodadyoushutup.com"]

- name: Create new SSL certificate if none exists
  uri:
    url: "http://192.168.1.101:81/api/nginx/certificates"
    method: POST
    headers:
      Authorization: "Bearer {{ token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      provider: "letsencrypt"
      nice_name: "truenas.nodadyoushutup.com Certificate"
      domain_names: ["truenas.nodadyoushutup.com"]
      meta:
        letsencrypt_agree: true
        letsencrypt_email: "admin@nodadyoushutup.com"
    return_content: yes
    status_code: [200, 201]
  register: create_cert_response
  when: certificate_id is not defined

- name: Verify SSL certificate creation status
  fail:
    msg: "Failed to create SSL certificate. Response: {{ create_cert_response.content }}"
  when:
    - create_cert_response.status not in [200, 201]
    - certificate_id is not defined

- name: Set certificate ID from newly created certificate
  set_fact:
    certificate_id: "{{ create_cert_response.json.id }}"
  when: certificate_id is not defined

- name: Check if proxy host exists for domain
  uri:
    url: "http://192.168.1.101:81/api/nginx/proxy-hosts"
    method: GET
    headers:
      Authorization: "Bearer {{ token }}"
    return_content: yes
  register: hosts_response

- name: Find existing host ID
  set_fact:
    host_id: "{{ item.id }}"
  loop: "{{ hosts_response.json }}"
  when: item.domain_names == domain_names
  vars:
    domain_names: ["truenas.nodadyoushutup.com"]

- name: Create proxy host if none exists
  uri:
    url: "http://192.168.1.101:81/api/nginx/proxy-hosts"
    method: POST
    headers:
      Authorization: "Bearer {{ token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      domain_names: ["truenas.nodadyoushutup.com"]
      forward_scheme: "http"
      forward_host: "192.168.1.101"
      forward_port: 9055
      certificate_id: "{{ certificate_id }}"
      ssl_forced: true
      hsts_enabled: true
      hsts_subdomains: true
      http2_support: true
      block_exploits: true
      caching_enabled: false
      allow_websocket_upgrade: true
      access_list_id: 0
      enabled: true
    return_content: yes
    status_code: [200, 201]
  register: create_host_response
  when: host_id is not defined

- name: Verify proxy host creation status
  fail:
    msg: "Failed to create proxy host. Response: {{ create_host_response.content }}"
  when: 
    - create_host_response.status not in [200, 201]
    - host_id is not defined

- name: Update proxy host if it exists
  uri:
    url: "http://192.168.1.101:81/api/nginx/proxy-hosts/{{ host_id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      domain_names: ["truenas.nodadyoushutup.com"]
      forward_scheme: "http"
      forward_host: "192.168.1.101"
      forward_port: 9055
      certificate_id: "{{ certificate_id }}"
      ssl_forced: true
      hsts_enabled: true
      hsts_subdomains: true
      http2_support: true
      block_exploits: true
      caching_enabled: false
      allow_websocket_upgrade: true
      access_list_id: 0
      enabled: true
    return_content: yes
  register: update_host_response
  when: host_id is defined

- name: Output result of proxy host operation
  debug:
    msg: "{{ create_host_response.json if host_id is not defined else update_host_response.json }}"

---
- name: Init
  hosts: all
  strategy: free
  gather_facts: false
  become: true

  tasks:
    - name: Load config
      include_vars:
        file: "{{ playbook_dir }}/config.sub.yaml"
        name: config

    - name: Ping host
      ping:
      register: ping_result
      ignore_unreachable: true

    - name: Init fstab
      import_role:
        name: ../role/fstab
      when: ping_result.ping is defined and ping_result.ping == 'pong'
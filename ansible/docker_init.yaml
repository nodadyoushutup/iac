---
# docker_init
- name: Add Docker Hosts
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Load Configuration
      include_role:
        name: role/load_config

    - name: Add docker host from config
      add_host:
        name: "{{ config.virtual_machine.docker.ansible.host }}:{{ config.virtual_machine.docker.ansible.port }}"
        ansible_host: "{{ config.virtual_machine.docker.ansible.host }}"
        ansible_port: "{{ config.virtual_machine.docker.ansible.port }}"
        groups: docker

- name: Initialize Docker Environment
  hosts: docker
  gather_facts: no
  become: true
  check_mode: no
  tasks:
    - name: Load Configuration
      include_role:
        name: role/load_config

    - name: Ping VM
      include_role:
        name: role/vm_ping

    - name: Docker Setup and Service Management
      block:
        - name: VM Initialization Tasks
          include_role:
            name: role/vm_init

        - name: Migrate Prometheus configuration
          include_role:
            name: role/prometheus

        - name: Install or Update Docker
          include_role:
            name: role/docker
      when: vm_ping == true

---
- name: Init Docker
  hosts: docker
  gather_facts: true
  become: true
  check_mode: no

  tasks:
    - name: Check if SSH port is reachable using vm_ping role
      include_role:
        name: ../roles/vm_ping
      register: ping_result

    - name: Run if SSH check is successful
      block:
        - name: Run VM initialization role
          include_role:
            name: ../roles/vm_init
        - name: Run Docker installation role
          include_role:
            name: ../roles/docker_install
        - name: Stop Docker Compose services
          include_role:
            name: ../roles/docker_compose_down
        - name: Start Docker Compose services
          include_role:
            name: ../roles/docker_compose_up
      when: ping_result.results[0].nc_result.rc == 0

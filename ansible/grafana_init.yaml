---
# grafana_init.
- name: Add Docker Hosts
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Load Configuration
      include_role:
        name: role/config_load

    - name: Add Host from Config
      include_role:
        name: role/host_add
      vars:
        key: docker

- name: Initialize Grafana
  hosts: docker
  gather_facts: no
  become: true
  check_mode: no
  tasks:
    - name: Load Configuration
      include_role:
        name: role/config_load

    - name: Ping VM
      include_role:
        name: role/vm_ping

    - name: Initialize Grafana
      block:
        - name: Restart Docker Compose Managed Services
          include_role:
            name: role/docker_compose
          vars:
            run_down: true
            run_up: true
            up_services: "grafana prometheus"
            down_services: "grafana"
      when: vm_ping == true

name: Init Spacelift Modules
on:
  workflow_dispatch:
jobs:
  spacectl:
    runs-on: ubuntu-latest
    environment: spacelift
    env:
      SPACELIFT_API_KEY_ENDPOINT: ${{ secrets.SPACELIFT_API_KEY_ENDPOINT }}
      SPACELIFT_API_GITHUB_TOKEN: ${{ secrets.SPACELIFT_API_GITHUB_TOKEN }}
    steps:
      - name: Install spacectl
        uses: spacelift-io/setup-spacectl@main

      - name: Check and conditionally create versions for modules
        run: |
          # Debugging output
          spacectl module list
          
          # Run spacectl module list and parse each module
          modules=$(spacectl module list | tail -n +2) # Skip header row
          
          # Loop through each module line
          echo "$modules" | while read -r line; do
            # Extract module ID and version using awk with | as the field separator
            module_id=$(echo "$line" | awk -F ' *\\| *' '{print $2}' | xargs)
            current_version=$(echo "$line" | awk -F ' *\\| *' '{print $4}' | xargs)
            
            # Debugging output
            echo "Checking module ID: $module_id with version: '$current_version'"

            # Check if current_version matches semantic version pattern
            if [[ "$current_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Module $module_id already has a valid semantic version: $current_version. Skipping creation."
            else
              echo "No valid semantic version found for module $module_id. Creating a new version."

              # Attempt to create version and capture error output
              if ! spacectl module create-version --id "$module_id"; then
                echo "Failed to create version for module $module_id. Continuing with other modules."
              fi
            fi
          done

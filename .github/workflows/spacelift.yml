name: Init Spacelift Modules
on:
  workflow_dispatch:
jobs:
  spacectl:
    runs-on: ubuntu-latest
    environment: spacelift
    env:
      SPACELIFT_API_KEY_ENDPOINT: ${{ secrets.SPACELIFT_API_KEY_ENDPOINT }}
      SPACELIFT_API_GITHUB_TOKEN: ${{ secrets.SPACELIFT_API_GITHUB_TOKEN }}
    steps:
      - name: Install spacectl
        uses: spacelift-io/setup-spacectl@main

      - name: Attempt to create versions for all modules with full debugging
        run: |
          echo "Running spacectl module list to retrieve module information"
          # Retrieve the modules list and display the raw output
          raw_output=$(spacectl module list)
          echo "Raw spacectl output:"
          echo "$raw_output"

          # Parse each module line, excluding the header
          echo "$raw_output" | tail -n +2 | while read -r line; do
            echo "Processing line: '$line'"

            # Parse module ID and version with intermediate debugging
            module_id_raw=$(echo "$line" | awk -F '|' '{print $2}')
            current_version_raw=$(echo "$line" | awk -F '|' '{print $3}')
            echo "Raw parsed module ID field: '$module_id_raw'"
            echo "Raw parsed version field: '$current_version_raw'"

            # Trim whitespace from parsed fields
            module_id=$(echo "$module_id_raw" | xargs)
            current_version=$(echo "$current_version_raw" | xargs)
            echo "Trimmed module ID: '$module_id'"
            echo "Trimmed version: '$current_version'"

            # Final parsed values for debugging
            echo "Final parsed module ID: '$module_id', version: '$current_version'"
            echo "Environment endpoint: '$SPACELIFT_API_KEY_ENDPOINT'"

            # Attempt to create version and ignore errors
            echo "Attempting to create a new version for module '$module_id'."
            if ! spacectl module create-version --id "$module_id"; then
              echo "Error encountered while creating version for module '$module_id'. Ignoring and continuing."
            fi
          done

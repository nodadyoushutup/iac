name: Spacectl
on:
  workflow_dispatch:
    inputs:
      SPACELIFT_API_KEY_ENDPOINT:
        description: "Spacelift API Key Endpoint"
        required: false
jobs:
  spacectl:
    runs-on: ubuntu-latest
    environment: spacelift
    steps:
      - name: Install spacectl
        uses: spacelift-io/setup-spacectl@main

      - name: Login to Spacelift
        env:
          SPACELIFT_API_KEY_ENDPOINT: ${{ github.event.inputs.SPACELIFT_API_KEY_ENDPOINT }}
          SPACELIFT_API_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Using the built-in GITHUB_TOKEN
        run: spacectl module create-version --id terraform-spacelift-stack

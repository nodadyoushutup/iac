name: Init Spacelift Modules
on:
  workflow_dispatch:
jobs:
  spacectl:
    runs-on: ubuntu-latest
    environment: spacelift
    env:
      SPACELIFT_API_KEY_ENDPOINT: ${{ secrets.SPACELIFT_API_KEY_ENDPOINT }}
      SPACELIFT_API_GITHUB_TOKEN: ${{ secrets.SPACELIFT_API_GITHUB_TOKEN }}
    steps:
      - name: Install spacectl
        uses: spacelift-io/setup-spacectl@main

      - name: Attempt to create versions for all modules with full debugging
        run: |
          if ! spacectl module create-version --id terraform-spacelift-stack; then
            echo "Error encountered while creating version for module '$module_id'. Ignoring and continuing."
          fi
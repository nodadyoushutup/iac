name: Build and Release Packer Image

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+" # Matches tags like 1.0.0, 2.3.4, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: "Semantic version tag for the release (e.g., 1.0.0)."
        required: true
env:
  HCP_CLIENT_ID: ${{ secrets.HCP_CLIENT_ID }}
  HCP_CLIENT_SECRET: ${{ secrets.HCP_CLIENT_SECRET }}
  PACKER_LOG: 1

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Install Packages
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-system xorriso jq
          echo "DEBUG: Installed required packages."

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        id: setup
        with:
          version: "latest"

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Tag
        id: validate_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid tag format. Use semantic versioning (e.g., v1.0.0)."
            exit 1
          fi

          echo "Validated tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_ENV

      - name: Packer Init
        run: |
          echo "DEBUG: Initializing packer..."
          packer init packer/ubuntu.pkr.hcl
          echo "DEBUG: Packer initialized."

      - name: Packer Build
        run: |
          echo "DEBUG: Starting packer build for tag $TAG."
          packer build packer/ubuntu.pkr.hcl
          echo "DEBUG: Packer build completed."

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" --title "Release $TAG" --notes "Automated release of the Packer image."

      - name: Upload Artifact to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_PATH=$(ls output-*/ubuntu-*.img | head -n 1)
          if [[ -z "$ARTIFACT_PATH" ]]; then
            echo "No artifact found to upload."
            exit 1
          fi
          gh release upload "$TAG" "$ARTIFACT_PATH"

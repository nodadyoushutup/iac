name: Build and Release Packer Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version for the release (X.X.X). If not provided, auto-increment the patch version."
        required: false
        default: ""

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Install Packages
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-system xorriso jq
          echo "DEBUG: Installed required packages."

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        id: setup
        with:
          version: "latest"

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Packer Init
        run: |
          echo "DEBUG: Initializing packer..."
          packer init packer/ubuntu.pkr.hcl
          echo "DEBUG: Packer initialized."

      - name: Packer Build
        run: |
          echo "DEBUG: Starting packer build for branch ${GITHUB_REF}."
          packer build packer/ubuntu.pkr.hcl
          echo "DEBUG: Packer build completed."
          
      - name: Install GitHub CLI
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - name: Determine Next Version
        id: version
        run: |
          VERSION_INPUT="${{ github.event.inputs.version }}"
          
          # Fetch the latest release tag
          LATEST_VERSION=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          
          # Default to 0.0.1 if no releases exist
          if [[ -z "$LATEST_VERSION" ]]; then
            LATEST_VERSION="0.0.0"
          fi

          if [[ -z "$VERSION_INPUT" ]]; then
            # Check if the latest version is semantic
            if [[ $LATEST_VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              IFS='.' read -r -a PARTS <<< "$LATEST_VERSION"
              PATCH=$((PARTS[2] + 1))
              VERSION="${PARTS[0]}.${PARTS[1]}.$PATCH"
            else
              VERSION="0.0.1"
            fi
          else
            VERSION="$VERSION_INPUT"
          fi

          echo "Determined version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Build Packer Image
        env:
          PACKER_LOG: "1"
          PACKER_LOG_PATH: "./packer.log"
        run: |
          packer init .
          packer build -var "ubuntu_version=jammy" .

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$VERSION" --title "Release $VERSION" --notes "Automated release of the Packer image."

      - name: Upload Artifact to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_PATH=$(ls output-*/ubuntu-*.img | head -n 1)
          if [[ -z "$ARTIFACT_PATH" ]]; then
            echo "No artifact found to upload."
            exit 1
          fi
          gh release upload "$VERSION" "$ARTIFACT_PATH"

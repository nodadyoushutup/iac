name: Build and Deploy

on:
  workflow_dispatch:
  push:
    paths:
      - "packer/ubuntu.pkr.hcl"

env:
  HCP_CLIENT_ID: ${{ secrets.HCP_CLIENT_ID }}
  HCP_CLIENT_SECRET: ${{ secrets.HCP_CLIENT_SECRET }}
  HCP_PROJECT_ID: ${{ secrets.HCP_PROJECT_ID }}
  HCP_ORGANIZATION_ID: ${{ secrets.HCP_ORGANIZATION_ID }}
  HCP_BUCKET_NAME: "cloud-image"
  PACKER_LOG: 1

jobs:
  build-artifact:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version_fingerprint: ${{ steps.hcp.outputs.version_fingerprint }}
    steps:
      - name: Install Packages
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-system xorriso jq
          echo "DEBUG: Installed required packages."

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        id: setup
        with:
          version: "latest"

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Packer Init
        run: |
          echo "DEBUG: Initializing packer..."
          packer init packer/ubuntu.pkr.hcl
          echo "DEBUG: Packer initialized."

      - name: Packer Build
        run: |
          echo "DEBUG: Starting packer build for branch ${GITHUB_REF}."
          packer build packer/ubuntu.pkr.hcl
          echo "DEBUG: Packer build completed."

      - name: Get HCP Packer version fingerprint from Packer Manifest
        id: hcp
        run: |
          echo "DEBUG: Reading packer_manifest.json..."
          cat ./packer_manifest.json

          last_run_uuid=$(jq -r '.last_run_uuid' "./packer_manifest.json")
          echo "DEBUG: last_run_uuid = $last_run_uuid"

          build=$(jq -r '.builds[] | select(.packer_run_uuid == "'"$last_run_uuid"'")' "./packer_manifest.json")
          echo "DEBUG: build = $build"

          version_fingerprint=$(echo "$build" | jq -r '.custom_data.version_fingerprint')
          echo "DEBUG: version_fingerprint = $version_fingerprint"

          echo "::set-output name=version_fingerprint::$version_fingerprint"

  update-hcp-packer-channel:
    name: Update HCP Packer channel
    needs: ["build-artifact"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create and set channel
        working-directory: .github/scripts
        run: |
          echo "DEBUG: Determining channel name from ref ${GITHUB_REF_NAME}..."
          channel_name=$( echo ${{github.ref_name}} | sed 's/\./-/g')
          echo "DEBUG: Channel name resolved to ${channel_name}."
          ./create_channel_version.sh $HCP_BUCKET_NAME $channel_name "${{ needs.build-artifact.outputs.version_fingerprint }}"
